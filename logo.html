<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySocial - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        
        .header {
        
            align-items: center;
            padding: 5px 10px;
            background-color:MediumSeaGreen; /* Facebook-like blue */
            color: white;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            width: 100px;  /* Adjust logo size */
            height: 100px;
            border-radius: 80%;
            margin-right: 40px;
        }

        .app-name {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.pinimg.com/736x/91/eb/9a/91eb9a733f2baef064248bac9bbc23e1.jpg" alt="App Logo" class="logo"> 
        <div class="app-name">TwitteerVille</div>
    </div>

</body>
</html>
